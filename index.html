<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Osicion</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;800&display=swap" rel="stylesheet">

  <style>
    html {
      font-size: 14px;
    }

    body {
      font-family: 'Lexend', sans-serif;
      padding: 0;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    div {
      display: flex;
      align-items: center;
    }

    h2 {
      font-size: 5rem;
      font-weight: 800;
    }

    sup {
      font-size: 2.2rem;
      font-weight: 300;
      height: 90px;
    }

    @media (min-width: 768px) {
      html {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div>
    <h2>Osicion</h2>
    <sup>&#174;</sup>
  </div>
</body>
</html>
